name: NextGenGadgets CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added pandas and openpyxl here to fix the ImportError
        pip install pytest selenium flask mysql-connector-python pandas openpyxl

    - name: Run Unit Tests
      run: |
        # We use -v for a detailed report
        python -m pytest -v
