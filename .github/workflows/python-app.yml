name: NextGenGadgets CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest selenium flask mysql-connector-python pandas openpyxl xlsxwriter webdriver-manager

    - name: Start Local Web Server
      run: |
        # Starts your website in the background so Selenium can visit http://localhost:8000
        python -m http.server 8000 & 
        sleep 10 # Give the server a moment to wake up

    - name: Run Unit Tests
      run: |
        # Run tests in headless mode
        python -m pytest -v
